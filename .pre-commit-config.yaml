# Pre-commit hooks for atlas-infra (INF-1).
# Hook revs are pinned to releases >=14 days old per atlas-docs/02 §2.
minimum_pre_commit_version: "3.5.0"

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0  # 2025-08-09
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--allow-multiple-documents]  # Helm templates / multi-doc manifests
      - id: check-added-large-files
      - id: check-merge-conflict

  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.105.0  # 2026-01-06
    hooks:
      # terraform_fmt is now owned by Trunk (.trunk/trunk.yaml: terraform fmt).
      # terraform_validate stays here — the validate gate is unchanged by Trunk.
      - id: terraform_validate
