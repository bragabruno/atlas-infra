# Bitbucket Pipelines — atlas-infra (INF-2 Gate 1 for IaC, ADR-019, XCUT-6).
#
# Orchestration only: every gate calls a versioned script under scripts/ (the
# single source of truth). Run `make ci` locally for the same gates. Logic lives
# in scripts/, not in this file. See scripts/README.md + atlas-docs/07-build-system.md.
#
# Gate 1a (scripts/lint.sh): Trunk (terraform fmt + tflint, .trunk/trunk.yaml).
# Gate 1b (scripts/test.sh): per-dir `terraform init -backend=false` + validate
#                            (modules + bootstrap + envs/dev; offline, no state).
# Gate 1c (scripts/security.sh): Checkov + Trivy config + gitleaks. Run strict in
#          CI (ATLAS_SECURITY_STRICT=1) so findings fail; each scanner runs where
#          its tool is present and skips cleanly elsewhere (so one script fronts
#          all three across the pinned scanner images).
# XCUT-6  (scripts/validate_diagrams.sh): Mermaid + PlantUML diagram validation.
#
# Provider versions are pinned in versions.tf and locked in .terraform.lock.hcl
# (XCUT-4). Image tags are pinned exactly (atlas-docs/02 §2). Auth to Azure (if
# ever needed) is OIDC; no secret values appear in this file.

image: hashicorp/terraform:1.15.4  # Terraform 1.15.4 (2026-05-20); 1.15.0 had an azurerm partial-backend validate regression

definitions:
  caches:
    trunk-cache: ~/.cache/trunk

  steps:
    - step: &lint
        name: "Gate 1a — Trunk fmt + tflint (scripts/lint.sh)"
        caches: [trunk-cache]
        script:
          # Env prep only; all validation logic is in scripts/lint.sh. Trunk is
          # git-native and fetches its tools at runtime, so the base image needs
          # git + curl + network (still zero secret/API spend).
          - apt-get update && apt-get install -y --no-install-recommends git curl ca-certificates
          - curl -fsSL https://get.trunk.io | bash -s -- -y
          - ./scripts/lint.sh

    - step: &tf-validate
        name: "Gate 1b — per-dir init/validate (scripts/test.sh)"
        script:
          - ./scripts/test.sh

    - step: &checkov
        name: "Gate 1c — Checkov (scripts/security.sh, strict)"
        image: bridgecrew/checkov:3.2.529  # Checkov 3.2.529 (2026-05-14)
        script:
          # Only Checkov is present in this image; Trivy + gitleaks skip cleanly.
          # Strict so Checkov findings fail the gate.
          - ATLAS_SECURITY_STRICT=1 ./scripts/security.sh

    - step: &trivy
        name: "Gate 1d — Trivy config scan (scripts/security.sh, strict)"
        image: aquasec/trivy:0.70.0  # Trivy 0.70.0 (2026-04-17)
        script:
          # Only Trivy is present in this image; Checkov + gitleaks skip cleanly.
          # Strict so Trivy findings fail the gate.
          - ATLAS_SECURITY_STRICT=1 ./scripts/security.sh

    - step: &diagram-validation
        name: "XCUT-6 — Diagram validation (scripts/validate_diagrams.sh)"
        image: node:22.22.2-bookworm-slim  # 22.22.2 (2026-03-24)
        script:
          - apt-get update && apt-get install -y --no-install-recommends
              default-jre-headless chromium fonts-liberation
          - export PLANTUML_VERSION=1.2026.3
          - curl -fsSL -o /tmp/plantuml.jar
              "https://github.com/plantuml/plantuml/releases/download/v${PLANTUML_VERSION}/plantuml-${PLANTUML_VERSION}.jar"
          - export PLANTUML_JAR=/tmp/plantuml.jar
          - export PUPPETEER_EXECUTABLE_PATH=/usr/bin/chromium
          - printf '{"args":["--no-sandbox"]}' > /tmp/puppeteer.json
          - export PUPPETEER_CONFIG=/tmp/puppeteer.json
          - ./scripts/validate_diagrams.sh docs/diagrams

pipelines:
  pull-requests:
    "**":
      - parallel:
          - step: *lint
          - step: *tf-validate
          - step: *checkov
          - step: *trivy
          - step: *diagram-validation
