# Atlas optional local OFFLINE dev loop (ADR-023).
#
# Free local equivalents for every paid service, so Atlas runs end-to-end on a
# laptop at zero cloud cost. Image tags are pinned and clear the 14-day
# supply-chain floor (atlas-docs/02 §2); full mapping + caveats in
# atlas-docs/research/local-mock-stack.md.
#
# NOT a production mirror: does NOT reproduce CMK, private endpoints, Workload
# Identity, TLS-only paths, or network ACLs. Use the AKS dev loop (§4.3) for
# infrastructure/security validation; use this for functional development.
#
# Usage (from atlas-infra/):  make local-up   /   make local-down
# Host ports: gateway 8090 · mcp-doc-search 8081 · mcp-citations 8082 · frontend 8080
#             agent-runtime 8083
#             qdrant 6333 · elasticsearch 9200 · postgres 5432 · valkey 6379
#             mlflow 5500 · openobserve 5080 · azurite 10000-2 · lowkey-vault 8443
#             (mlflow on host 5500 — :5000 collides with macOS AirPlay Receiver)
# Jobs profile (not started by `up`): drift-eval (atlas-prompts nightly batch).
#   Run on demand:  docker compose -f local/compose.dev.yaml --profile jobs \
#     run --rm drift-eval python scripts/nightly_drift_eval.py --source shadow.jsonl

name: atlas-local

services:
  # ─── Backends — free local equivalents ──────────────────────────────────
  postgres:
    image: postgres:16.8
    environment:
      POSTGRES_DB: atlas
      POSTGRES_USER: atlas
      POSTGRES_PASSWORD: atlas # local-only dev credential; not a secret
    ports: ["5432:5432"]
    volumes: ["pg-data:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atlas -d atlas"]
      interval: 10s
      timeout: 5s
      retries: 5

  valkey:
    image: valkey/valkey:8.0
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.17.1
    ports: ["6333:6333", "6334:6334"]
    volumes: ["qdrant-data:/qdrant/storage"]

  # Real Elasticsearch (free basic license), replacing the earlier OpenSearch
  # substitute: the pinned client (elasticsearch==9.4.0) hard-refuses
  # OpenSearch (product check + vendored content types → 406), so the
  # substitution could never serve the MCP search/ingest path. Matches prod
  # (atlas-infra/platform/elasticsearch) and the client pin exactly.
  elasticsearch:
    image: elasticsearch:9.4.0 # released 2026-05-12 (>14d); matches client pin
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false" # local-only: plain HTTP on :9200
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports: ["9200:9200"]
    volumes: ["es-data:/usr/share/elasticsearch/data"]

  redpanda:
    image: redpandadata/redpanda:v25.1.1
    command:
      - redpanda
      - start
      - --mode=dev-container
      - --smp=1
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:9092
    ports: ["9092:9092"]

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:3.33.0
    command: ["azurite", "--blobHost", "0.0.0.0", "--queueHost", "0.0.0.0", "--tableHost", "0.0.0.0"]
    ports: ["10000:10000", "10001:10001", "10002:10002"]
    volumes: ["azurite-data:/data"]

  # Key Vault test double — published amd64-only, so it runs under emulation on
  # Apple Silicon. No Atlas service consumes it (the dev gateway runs model=mock
  # with no provider keys), so it's gated behind the `parity` profile and is NOT
  # started by `up`. Run it explicitly with `--profile parity` if ever needed.
  lowkey-vault:
    image: nagyesta/lowkey-vault:7.2.18 # released 2026-05-11 (>14d); 3.6.1 never existed
    profiles: ["parity"]
    ports: ["8443:8443"]

  mlflow:
    image: ghcr.io/mlflow/mlflow:v3.12.0
    command: >
      mlflow server --host 0.0.0.0 --port 5000
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --default-artifact-root /mlflow/artifacts
    # Host 5500 (not 5000): macOS ControlCenter/AirPlay Receiver binds :5000.
    # In-cluster access is unaffected (drift-eval uses http://mlflow:5000).
    ports: ["5500:5000"]
    volumes: ["mlflow-data:/mlflow"]

  openobserve:
    image: openobserve/openobserve:v0.14.4
    environment:
      ZO_ROOT_USER_EMAIL: dev@atlas.local
      ZO_ROOT_USER_PASSWORD: Atlas-local-5080 # local-only dev credential
    ports: ["5080:5080", "5081:5081"]
    volumes: ["o2-data:/data"]

  # ─── Atlas services — built from sibling repos ───────────────────────────
  gateway:
    build:
      context: ../../atlas-gateway
    environment:
      ATLAS_API_KEYS: '["dev-key"]'
      ATLAS_REDIS_URL: redis://valkey:6379
      ATLAS_CACHE_ENABLED: "true"
      ATLAS_RATE_LIMIT_ENABLED: "true"
      # Allow the frontend SPA (host browser at :8080) to call the gateway
      # cross-origin (config-gated CORS — atlas-gateway).
      ATLAS_CORS_ALLOW_ORIGINS: '["http://localhost:8080"]'
      # Route real inference to a local Ollama (OpenAI-compatible, no API key,
      # free). The gateway runs in-container, so it reaches the host's Ollama via
      # host.docker.internal (see extra_hosts). With these unset the gateway
      # falls back to model=mock (MockProvider, ADR-012). Models must be pulled
      # in Ollama (`ollama list`); adjust ATLAS_OLLAMA_MODELS to taste.
      ATLAS_OLLAMA_BASE_URL: http://host.docker.internal:11434/v1
      ATLAS_OLLAMA_MODELS: '["gpt-oss:120b-cloud","kimi-k2.5:cloud","deepseek-v3.1:671b-cloud","qwen3-coder:480b-cloud"]'
      # Cost-trail endpoint (GET /v1/usage) — config-gated on this DSN (asyncpg
      # style, no +psycopg). Run the gateway's alembic migration once so the
      # call_records table exists (alembic wants its own sync DSN):
      #   docker compose -f local/compose.dev.yaml exec \
      #     -e ATLAS_DATABASE_URL=postgresql+psycopg://atlas:atlas@postgres:5432/atlas \
      #     gateway alembic upgrade head
      ATLAS_DB_URL: postgresql://atlas:atlas@postgres:5432/atlas
      # Accounting (GW-14/15): every non-streaming completion writes a priced
      # call_records row and emits an atlas.calls.v1 event to Redpanda — this
      # is what fills /v1/usage and the Redpanda Console under load tests.
      ATLAS_ACCOUNTING_ENABLED: "true"
      ATLAS_KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      OTEL_EXPORTER_OTLP_ENDPOINT: http://openobserve:5081
    # Reach the host's Ollama (127.0.0.1:11434 on the host) from inside the
    # container. Automatic on Docker Desktop; host-gateway makes it work on Linux.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Host 8090 (not 8000): :8000 is commonly taken by a local mcp-proxy. The
    # SPA reaches the gateway at host localhost:8090 (frontend-config.json);
    # in-cluster callers still use http://gateway:8000. CORS origin stays the
    # frontend's :8080.
    ports: ["8090:8000"]
    depends_on:
      valkey:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_started

  mcp-doc-search:
    build:
      context: ../../atlas-mcp-doc-search
    environment:
      ELASTICSEARCH_URL: http://elasticsearch:9200
      QDRANT_URL: http://qdrant:6333
      ATLAS_GATEWAY_URL: http://gateway:8000
      ATLAS_GATEWAY_API_KEY: dev-key
      # FastMCP defaults to 127.0.0.1 inside the container — bind 0.0.0.0 so the
      # published 8081:8000 port is reachable from the host.
      FASTMCP_HOST: "0.0.0.0"
    ports: ["8081:8000"]
    depends_on:
      gateway:
        condition: service_started
      qdrant:
        condition: service_started
      elasticsearch:
        condition: service_started

  mcp-citations:
    build:
      context: ../../atlas-mcp-citations
    environment:
      ELASTICSEARCH_URL: http://elasticsearch:9200
      QDRANT_URL: http://qdrant:6333
      # FastMCP defaults to 127.0.0.1 inside the container — bind 0.0.0.0 so the
      # published 8082:8000 port is reachable from the host.
      FASTMCP_HOST: "0.0.0.0"
    ports: ["8082:8000"]
    depends_on:
      qdrant:
        condition: service_started
      elasticsearch:
        condition: service_started

  frontend:
    build:
      context: ../../atlas-frontend
    # The SPA runs in the host browser, so gatewayUrl must point at the
    # host-mapped gateway port (localhost:8000), NOT the compose hostname.
    # Requires gateway CORS for http://localhost:8080 — see local/README.md.
    volumes:
      - ./frontend-config.json:/usr/share/nginx/html/config.json:ro
    ports: ["8080:8080"]
    depends_on:
      gateway:
        condition: service_started

  agent-runtime:
    build:
      context: ../../atlas-agent-runtime
    environment:
      ATLAS_GATEWAY_URL: http://gateway:8000
      ATLAS_GATEWAY_API_KEY: dev-key
      # Persistence is config-gated; wiring the DSN enables GET /v1/agent/runs/{id}.
      ATLAS_DATABASE_URL: postgresql+psycopg://atlas:atlas@postgres:5432/atlas
      ATLAS_MCP_DOC_SEARCH_URL: http://mcp-doc-search:8000
      ATLAS_MCP_CITATIONS_URL: http://mcp-citations:8000
      OTEL_EXPORTER_OTLP_ENDPOINT: http://openobserve:5081
    ports: ["8083:8000"]
    depends_on:
      gateway:
        condition: service_started
      postgres:
        condition: service_healthy

  # ─── Dev UIs — browse the non-relational stores ──────────────────────────
  redpanda-console:
    image: docker.redpanda.com/redpandadata/console:v3.7.3 # released 2026-05-20 (>14d)
    environment:
      KAFKA_BROKERS: redpanda:9092
    ports: ["8086:8080"]
    depends_on:
      redpanda:
        condition: service_started

  redisinsight:
    image: redis/redisinsight:3.4.2 # released 2026-04-22 (>14d)
    # RI_* pre-registers the Valkey connection on first boot (ignored if unsupported).
    environment:
      RI_REDIS_HOST: valkey
      RI_REDIS_PORT: "6379"
      RI_REDIS_ALIAS: atlas-valkey
    ports: ["5540:5540"]
    volumes: ["redisinsight-data:/data"]
    depends_on:
      valkey:
        condition: service_healthy

  # ─── Jobs (profile-gated — never started by `up`) ────────────────────────
  drift-eval:
    build:
      context: ../../atlas-prompts
    profiles: ["jobs"]
    environment:
      ATLAS_KAFKA_BOOTSTRAP: redpanda:9092
      MLFLOW_TRACKING_URI: http://mlflow:5000
      ATLAS_DRIFT_EXPERIMENT: atlas-drift
      ATLAS_DRIFT_ALERT_PCT: "10.0"
      ATLAS_SHADOW_LIMIT: "1000"
    depends_on:
      redpanda:
        condition: service_started
      mlflow:
        condition: service_started

  # Load generator (POL-6 successor): web UI at http://localhost:8089, or run
  # headless:  docker compose -f local/compose.dev.yaml --profile loadtest \
  #   run --rm locust -f /mnt/locust/locustfile.py --headless -u 20 -r 5 -t 60s
  locust:
    image: locustio/locust:2.44.0 # released 2026-05-11 (>14d)
    profiles: ["loadtest"]
    command: -f /mnt/locust/locustfile.py
    environment:
      # In-network targets (the locustfile reads these).
      ATLAS_BASE: http://gateway:8000
      ATLAS_AGENT: http://agent-runtime:8000
      ATLAS_KEY: dev-key
    volumes:
      - ../../atlas-gateway/loadtest:/mnt/locust:ro
    ports: ["8089:8089"]
    depends_on:
      gateway:
        condition: service_started
      agent-runtime:
        condition: service_started

  # One-shot DB seeder (reuses the gateway image — scripts ship in it):
  #   docker compose -f local/compose.dev.yaml --profile jobs run --rm seed-db \
  #     python scripts/seed_db.py --records 500 --kafka
  seed-db:
    build:
      context: ../../atlas-gateway
    profiles: ["jobs"]
    environment:
      ATLAS_SEED_DSN: postgresql://atlas:atlas@postgres:5432/atlas
      ATLAS_KAFKA_BOOTSTRAP: redpanda:9092
    entrypoint: ["python", "scripts/seed_db.py"]
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_started

volumes:
  pg-data:
  qdrant-data:
  es-data:
  azurite-data:
  mlflow-data:
  o2-data:
  redisinsight-data:
