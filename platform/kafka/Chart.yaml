apiVersion: v2
name: atlas-kafka
description: |
  Atlas platform – Strimzi Kafka operator + KafkaTopic manifests.
  For dev, Azure Event Hubs (Kafka endpoint) is the recommended zero-ops alternative;
  see README for both paths. This chart installs Strimzi for environments that need
  full Kafka semantics (prod) or want a local self-managed cluster.
type: application
version: 0.1.0
appVersion: "1.0.0"

dependencies:
  - name: strimzi-kafka-operator
    version: "1.0.0"
    repository: "https://strimzi.io/charts/"
    # Chart version 1.0.0 released 2026-04-28 (github.com/strimzi/strimzi-kafka-operator tag 1.0.0)
    # Verified >= 14 days before 2026-05-24 cutoff: OK
    # NOTE: Strimzi 1.0.0 supports ONLY v1 CRD API. Older v1beta2/v1alpha1 CRDs must be
    #       migrated before upgrading from 0.x. See https://strimzi.io/docs/operators/latest/full.html
