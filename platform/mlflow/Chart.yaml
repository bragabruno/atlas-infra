apiVersion: v2
name: atlas-mlflow
description: |
  Atlas platform – MLflow tracking server.
  Backend store: Azure Database for PostgreSQL Flexible Server (modules/data).
  Artifact store: Azure Blob Storage container "artifacts" (modules/storage).
  Credentials are never in values — injected via Key Vault CSI + Workload Identity.
type: application
version: 0.1.0
appVersion: "3.7.0"

dependencies:
