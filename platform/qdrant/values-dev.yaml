qdrant:
  # ---------------------------------------------------------------------------
  # Replica / availability
  # ---------------------------------------------------------------------------
  replicaCount: 1           # dev: single replica (no HA)

  # ---------------------------------------------------------------------------
  # Image
  # ---------------------------------------------------------------------------
  image:
    repository: qdrant/qdrant
    tag: v1.18.0
    pullPolicy: IfNotPresent

  # ---------------------------------------------------------------------------
  # Resources — dev-sized (burstable node pool)
  # ---------------------------------------------------------------------------
  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "1000m"
      memory: "2Gi"

  # ---------------------------------------------------------------------------
  # Persistence
  # ---------------------------------------------------------------------------
  persistence:
    size: "10Gi"
    storageClassName: ""    # use cluster default (managed-csi in AKS)
    accessModes:
      - ReadWriteOnce

  # ---------------------------------------------------------------------------
  # Service
  # ---------------------------------------------------------------------------
  service:
    type: ClusterIP
    port: 6333             # REST / gRPC HTTP2

  # ---------------------------------------------------------------------------
  # Qdrant config (mapped to /qdrant/config/production.yaml inside the pod)
  # ---------------------------------------------------------------------------
  config:
    cluster:
      enabled: false       # single-node in dev

  # ---------------------------------------------------------------------------
  # Collections are created post-startup by the atlas-qdrant-init Job.
  # See templates/collection-init-job.yaml
  # ---------------------------------------------------------------------------
